<!-- sidebar.html -->
<aside class="sidebar" id="sidebar">
  <div>
    <div class="sidebar-header">
      <img src="{{ "images/avatar.svg" | relURL }}" alt="SAIER" class="sidebar-avatar">
      <div class="sidebar-name">{{ .Site.Data.site.name }}</div>
      <div class="sidebar-title">{{ .Site.Data.site.tagline }}</div>
    </div>

    <nav class="sidebar-nav">
      {{ range .Site.Data.navigation.sections }}
      <a href="{{ .url }}" class="nav-link" data-section="{{ .id }}">
        <span class="nav-number">{{ .number }}.</span>
        <span>{{ i18n .i18n_key | default .i18n_key }}</span>
      </a>
      {{ end }}
    </nav>
  </div>

  <div class="sidebar-footer">
    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="social-icon-link">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
    </a>
    <a href="mailto:{{ .Site.Params.email }}" aria-label="Email" class="social-icon-link">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
    </a>
    <button class="theme-toggle" id="theme-toggle" aria-label="{{ i18n "dark_mode" }}">
      <!-- Sun icon (shown in dark mode) -->
      <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <!-- Moon icon (shown in light mode) -->
      <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</aside>

<!-- Mobile menu toggle -->
<button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12h18M3 6h18M3 18h18"/>
  </svg>
</button>
