{{ define "main" }}
<div class="page-header">
  <div class="container">
    <p class="page-meta">{{ .Date.Format "January 2, 2006" }}
      {{ with .Params.tags }} · {{ range . }}<span style="color:var(--accent);">#{{ . }}</span> {{ end }}{{ end }}
    </p>
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
</div>
<div class="container">
  <div class="page-content fade-up">
    {{ .Content }}
  </div>
  <div class="back-link">
    <a href="{{ "blog" | relLangURL }}">← {{ if eq .Site.Language.Lang "zh" }}返回博客列表{{ else }}Back to Blog{{ end }}</a>
  </div>
</div>
{{ end }}
